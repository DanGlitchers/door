<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>שאלה חשובה לליב...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffe6ea;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 105, 135, 0.2);
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* עיצוב לתמונות ול-GIFs */
        .media-img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            margin-bottom: 20px;
            max-height: 200px; /* מגביל גובה כדי שלא יתפוס את כל המסך */
        }

        /* הסתרת מסכים לא פעילים */
        .hidden {
            display: none !important;
        }

        h1 {
            color: #ff4757;
            font-size: 24px;
            margin-bottom: 25px;
            line-height: 1.3;
            margin-top: 0;
        }

        .buttons-wrapper {
            display: flex;
            justify-content: center;
            gap: 15px;
            position: relative;
            width: 100%;
        }

        button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.3);
            z-index: 10;
            flex: 1; /* שהכפתורים יהיו באותו גודל */
            max-width: 120px;
        }

        button:hover {
            background-color: #ff6b81;
            transform: scale(1.05);
        }

        /* כפתור הלא יהיה בעל מיקום שניתן לשנות */
        #btn-no {
            background-color: #747d8c;
            box-shadow: 0 5px 15px rgba(116, 125, 140, 0.3);
            transition: left 0.2s ease, top 0.2s ease; /* תנועה מהירה וחלקה */
            position: relative; /* התחלתי */
        }

        #btn-no:hover {
            background-color: #57606f;
        }

        /* מסך סיום - הלב הפועם */
        .heart {
            font-size: 50px;
            animation: pulse 1s infinite alternate;
            margin-top: 10px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }
    </style>
</head>
<body>

    <!-- מסך ראשון -->
    <div id="screen-1" class="container">
        <!-- GIF ראשון - מסמיק -->
        <img src="https://media.tenor.com/RdB18yNBvB8AAAAd/blush-blushing.gif" alt="מסמיק" class="media-img">
        <h1>ליב, את יודעת שאני אוהב אותך?</h1>
        <div class="buttons-wrapper">
            <button onclick="nextScreen()">כן</button>
            <button onclick="nextScreen()">כן</button>
        </div>
    </div>

    <!-- מסך שני -->
    <div id="screen-2" class="container hidden">
        <!-- תמונה שנייה - חתול עם לבבות -->
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRn3qGygy8QjoLssHmmby7tlAtDlLbKhVOj4w&s" alt="חתול לבבות" class="media-img">
        <h1>ואת גם אוהבת אותי?</h1>
        <div class="buttons-wrapper" id="buttons-container-2">
            <button onclick="finalScreen()">כן</button>
            <button id="btn-no">לא</button>
        </div>
    </div>

    <!-- מסך סיום -->
    <div id="screen-3" class="container hidden">
        <!-- GIF שלישי - שמח ומסמיק -->
        <img src="https://media.tenor.com/_jH80HS4Al8AAAAM/happy-blush.gif" alt="שמח" class="media-img">
        <h1>ידעתי! 😍</h1>
        <div class="heart">❤️</div>
    </div>

    <script>
        function nextScreen() {
            document.getElementById('screen-1').classList.add('hidden');
            document.getElementById('screen-2').classList.remove('hidden');
        }

        function finalScreen() {
            document.getElementById('screen-2').classList.add('hidden');
            document.getElementById('screen-3').classList.remove('hidden');
        }

        const noBtn = document.getElementById('btn-no');

        // פונקציה שמזיזה את הכפתור למקום אקראי על המסך
        function dodge() {
            // משנה את המיקום למוחלט כדי שיוכל לזוז בחופשיות על המסך
            noBtn.style.position = 'fixed';
            
            // חישוב גבולות המסך כדי שהכפתור לא יברח החוצה
            // אנחנו משאירים מרווח ביטחון קטן (padding)
            const padding = 20;
            const maxX = window.innerWidth - noBtn.clientWidth - padding;
            const maxY = window.innerHeight - noBtn.clientHeight - padding;

            // יצירת נקודות ציון אקראיות בגבולות המסך
            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            // הזזת הכפתור
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // מפעיל את הבריחה כשהעכבר מתקרב (למחשב)
        noBtn.addEventListener('mouseover', dodge);
        
        // מפעיל את הבריחה כשמנסים לגעת (לטלפון)
        noBtn.addEventListener('touchstart', function(e) {
            e.preventDefault(); // מונע התנהגות ברירת מחדל של מגע
            dodge();
        });

        // ליתר ביטחון, אם היא מצליחה ללחוץ (קליק), זה גם יגרום לו לברוח
        noBtn.addEventListener('click', dodge);
    </script>

</body>
</html>
