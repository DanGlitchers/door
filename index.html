<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מכתב אהבה אינטראקטיבי</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffe6e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 300px;
            height: 400px;
        }
        .message-box {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.8s ease;
        }
        .message-box.show {
            opacity: 1;
            transform: scale(1);
        }
        .message-box h1 {
            color: #ff4d4d;
            font-size: 24px;
            margin-bottom: 15px;
        }
        .message-box p {
            color: #333;
            font-size: 18px;
            line-height: 1.5;
        }
        .door {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #8b4513;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 1.2s ease;
            transform-origin: right; /* נפתח כמו דלת אמיתית בעברית */
        }
        .door.open {
            transform: perspective(1200px) rotateY(105deg);
        }
        .doorknob {
            position: absolute;
            left: 20px;
            top: 50%;
            width: 20px;
            height: 20px;
            background-color: #ffd700;
            border-radius: 50%;
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3);
        }
        .heart {
            font-size: 40px;
            margin-top: 10px;
            animation: beat 1s infinite;
        }
        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="message-box" id="message">
            <h1>הפתעה! ❤️</h1>
            <p>רציתי להגיד לך משהו חשוב...</p>
            <p>את/ה פשוט מדהים/ה! תודה שאת/ה תמיד כאן בשבילי.</p>
            <div class="heart">❤️</div>
        </div>
        
        <div class="door" id="door" onclick="openDoor()">
            לחץ לפתיחה
            <div class="doorknob"></div>
        </div>
    </div>

    <script>
        function openDoor() {
            document.getElementById('door').classList.add('open');
            setTimeout(() => {
                document.getElementById('message').classList.add('show');
            }, 500); // מציג את ההודעה תוך כדי שהדלת נפתחת
        }
    </script>

</body>
</html>
