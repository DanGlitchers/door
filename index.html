<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>שאלה חשובה...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffe6ea;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 105, 135, 0.2);
            width: 90%;
            max-width: 400px;
        }

        /* הסתרת מסכים לא פעילים */
        .hidden {
            display: none !important;
        }

        h1 {
            color: #ff4757;
            font-size: 26px;
            margin-bottom: 30px;
        }

        .buttons-wrapper {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
        }

        button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
            z-index: 10;
        }

        button:hover {
            background-color: #ff6b81;
            transform: scale(1.05);
        }

        /* כפתור הלא יהיה בעל מיקום שניתן לשנות */
        #btn-no {
            background-color: #747d8c;
            box-shadow: 0 5px 15px rgba(116, 125, 140, 0.4);
            transition: left 0.3s ease, top 0.3s ease; /* תנועה חלקה כשהוא בורח */
        }

        #btn-no:hover {
            background-color: #57606f;
        }

        .heart {
            font-size: 60px;
            animation: pulse 1s infinite alternate;
            margin-top: 20px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <!-- מסך ראשון -->
    <div id="screen-1" class="container">
        <h1>את יודעת שאני אוהב אותך?</h1>
        <div class="buttons-wrapper">
            <button onclick="nextScreen()">כן</button>
            <button onclick="nextScreen()">כן</button>
        </div>
    </div>

    <!-- מסך שני -->
    <div id="screen-2" class="container hidden">
        <h1>את גם אוהבת אותי?</h1>
        <div class="buttons-wrapper" id="buttons-container-2">
            <button onclick="finalScreen()">כן</button>
            <button id="btn-no">לא</button>
        </div>
    </div>

    <!-- מסך סיום -->
    <div id="screen-3" class="container hidden">
        <h1>ידעתי! 😍</h1>
        <div class="heart">❤️</div>
    </div>

    <script>
        function nextScreen() {
            document.getElementById('screen-1').classList.add('hidden');
            document.getElementById('screen-2').classList.remove('hidden');
        }

        function finalScreen() {
            document.getElementById('screen-2').classList.add('hidden');
            document.getElementById('screen-3').classList.remove('hidden');
        }

        const noBtn = document.getElementById('btn-no');

        // פונקציה שמזיזה את הכפתור למקום אקראי על המסך
        function dodge() {
            // משנה את המיקום למוחלט כדי שיוכל לזוז בחופשיות על המסך
            noBtn.style.position = 'fixed';
            
            // חישוב גבולות המסך כדי שהכפתור לא יברח החוצה
            const maxX = window.innerWidth - noBtn.clientWidth - 20;
            const maxY = window.innerHeight - noBtn.clientHeight - 20;

            // יצירת נקודות ציון אקראיות
            const randomX = Math.max(10, Math.floor(Math.random() * maxX));
            const randomY = Math.max(10, Math.floor(Math.random() * maxY));

            // הזזת הכפתור
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // מפעיל את הבריחה כשהעכבר מתקרב (למחשב) או כשמנסים ללחוץ (לטלפון)
        noBtn.addEventListener('mouseover', dodge);
        noBtn.addEventListener('touchstart', dodge);
        noBtn.addEventListener('click', dodge);
    </script>

</body>
</html>
